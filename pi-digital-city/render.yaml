services:
  - type: web
    name: pi-digital-city-backend
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: PI_API_KEY
        sync: false
      - key: PI_API_BASE
        value: https://api.minepi.com/v2
      - key: PI_SANDBOX
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: SEED_ADMIN_USERNAMES
        sync: false

  - type: web
    name: pi-digital-city-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_PI_SANDBOX
        value: "false"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
